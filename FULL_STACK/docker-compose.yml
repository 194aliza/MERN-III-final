services:
  mongodb:
    image: mongo:7.0
    container_name: mern-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: mern-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - mern-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mern-backend
    restart: always
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://admin:password@mongodb:27017/mern-db?authSource=admin
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-your_secret_key_change_in_production}
      JWT_EXPIRE: 7d
      REFRESH_JWT_SECRET: ${REFRESH_JWT_SECRET:-your_refresh_secret_key}
      REFRESH_JWT_EXPIRE: 30d
      CLOUDINARY_NAME: ${CLOUDINARY_NAME:-your_cloudinary_name}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-your_api_key}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-your_api_secret}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-your_email@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-your_app_password}
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: mern-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mern-network
    volumes:
      - ./src:/app/src
      - ./public:/app/public

volumes:
  mongodb_data:
  mongodb_config:

networks:
  mern-network:
    driver: bridge
